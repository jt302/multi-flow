name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check & build (${{ matrix.os }})
    runs-on: macos-latest # Apple Silicon runner — cheaper and faster for basic validation

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust dependency cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Frontend — TypeScript check + Vite build
        run: pnpm -s build

      - name: Backend — cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml
