name: Release

on:
  push:
    tags:
      - 'v*'

# Allow only one release workflow per tag to run at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required to create GitHub Releases and upload assets

jobs:
  build:
    name: Build DMG (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest # Apple Silicon (ARM) — native build
            target: aarch64-apple-darwin
          - runner: macos-13 # Intel runner — native x86_64 build
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify signing and notarization secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID
          do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required macOS signing/notarization secrets: ${missing[*]}"
            echo "Unsigned release artifacts are blocked by policy."
            exit 1
          fi

      # ── Sidecar pre-flight check ────────────────────────────────────────────
      # Tauri requires external binaries named <binary>-<target-triple>.
      # Ensure both sidecars exist for the current build target before wasting
      # runner time on a compile that will fail at the bundle step.
      - name: Verify sidecar binaries for ${{ matrix.target }}
        shell: bash
        run: |
          missing=()
          for bin in proxy-daemon multi-flow-sync-manager; do
            path="src-tauri/binaries/${bin}-${{ matrix.target }}"
            if [[ ! -f "$path" ]]; then
              missing+=("$path")
            fi
          done
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing sidecar binary(ies) for target ${{ matrix.target }}:"
            for f in "${missing[@]}"; do echo "  $f"; done
            echo ""
            echo "Build both binaries for the target and place them in src-tauri/binaries/."
            exit 1
          fi
          echo "All sidecar binaries present for ${{ matrix.target }}."

      # ── Toolchain ───────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Rust with ${{ matrix.target }}
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.target }}

      - name: Rust dependency cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # ── Frontend ────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Release metadata consistency
        run: pnpm -s release:check

      # ── Tauri build + GitHub Release upload ─────────────────────────────────
      # tauri-action creates a draft release and uploads .dmg + .app.tar.gz.
      # Remove `releaseDraft: true` once you have code signing configured.
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Multi-Flow ${{ github.ref_name }}'
          releaseBody: |
            ## Multi-Flow ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
